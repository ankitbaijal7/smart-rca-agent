version: "3.9"

# Full stack — backend + frontend + ChromaDB
# For cloud LLM fallback, set cloud credentials in .env

services:

  # ── ChromaDB Vector Store ──────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.11
    container_name: smart-rca-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
      - ALLOW_RESET=True
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smart-rca-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_URL=http://host.docker.internal:11434
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - rca_outputs:/app/rca_output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 120s

  # ── React Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: smart-rca-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  chroma_data:
  rca_outputs:
