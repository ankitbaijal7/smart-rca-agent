version: "3.9"

# Local / on-prem deployment — Ollama + ChromaDB + backend + frontend
# Run on your Proxmox Ubuntu VM

services:

  # ── Ollama (local LLM) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: smart-rca-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU passthrough (if available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Pull deepseek-r1:8b on first start ────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: smart-rca-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "ollama pull deepseek-r1:8b && ollama pull all-minilm"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ── ChromaDB ──────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.11
    container_name: smart-rca-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smart-rca-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - LLM_MODE=hybrid
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

  # ── Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: smart-rca-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  ollama_models:
  chroma_data:
